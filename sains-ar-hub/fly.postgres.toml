app = 'sains-ar-hub-pg'
primary_region = 'sin'

[build]
  dockerfile = "Dockerfile.postgres"

[env]
  CDS_ENV = 'postgres-cloud'
  NODE_ENV = 'production'
  PORT = '4004'

[http_service]
  internal_port = 4004
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 4004
    type = 'http'
    interval = '30s'
    timeout = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1024mb'
  cpu_kind = 'shared'
  cpus = 2
