# fly.toml app configuration file generated for sains-ar-hub on 2026-03-31T13:58:57Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sains-ar-hub'
primary_region = 'sin'

[build]

[env]
  CDS_ENV = 'poc'
  NODE_ENV = 'development'
  PORT = '4004'

[http_service]
  internal_port = 4004
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    port = 4004
    type = 'http'
    interval = '30s'
    timeout = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
