name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sains-ar-hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sains-ar-hub/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run test:integration
      - run: npx cds compile srv/ --to json > /dev/null
